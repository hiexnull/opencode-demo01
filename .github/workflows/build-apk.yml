name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug environment
        run: |
          whoami
          env | sort
          ls -la /opt/android/ || echo "No /opt/android"
          which buildozer || echo "buildozer not found"
          buildozer --version || echo "buildozer version failed"

      - name: Build APK
        run: |
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyMate-APK
          path: bin/*.apk
