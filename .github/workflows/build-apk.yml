name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          ln -sf /opt/android/android-sdk /home/user/
          ln -sf /opt/android/android-ndk /home/user/
          export PATH="/opt/android/android-sdk/cmdline-tools/latest/bin:/opt/android/android-sdk/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          cd $GITHUB_WORKSPACE
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyMate-APK
          path: bin/*.apk
